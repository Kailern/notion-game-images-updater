name: Update Game Images

on:
  schedule:
    - cron: '0 0 * * *'  # Tous les jours à minuit (UTC)
  workflow_dispatch:     # Permet de lancer manuellement depuis l'interface GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          IGDB_CLIENT_ID: ${{ secrets.IGDB_CLIENT_ID }}
          IGDB_CLIENT_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
          NOTION_IMAGE_PROPERTY: ${{ secrets.NOTION_IMAGE_PROPERTY }}
          NOTION_IGDB_ID_PROPERTY: ${{ secrets.NOTION_IGDB_ID_PROPERTY }}
          NOTION_HLTB_URL_PROPERTY: ${{ secrets.NOTION_HLTB_URL_PROPERTY }}
        run: python main.py